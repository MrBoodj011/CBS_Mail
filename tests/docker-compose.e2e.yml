services:
  greenmail:
    image: greenmail/standalone:2.1.9
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=test:test@example.test
        -Dgreenmail.users.login=email
    ports:
      - "127.0.0.1:3025:3025"
      - "127.0.0.1:3143:3143"

  roundcube-e2e:
    image: roundcube/roundcubemail@sha256:dc3d04b46feb148507c52db9b536c4f5a980e2d4f339a8f1a880225f1c9c0a62
    depends_on:
      - greenmail
    ports:
      - "127.0.0.1:8091:80"
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: greenmail
      ROUNDCUBEMAIL_DEFAULT_PORT: 3143
      ROUNDCUBEMAIL_SMTP_SERVER: greenmail
      ROUNDCUBEMAIL_SMTP_PORT: 3025
    volumes:
      - roundcube-e2e-db:/var/roundcube/db
      - ./fixtures/config.inc.php:/var/www/html/config/config.inc.php
      - ../branding:/var/www/html/skins/elastic/branding
      - ../branding/watermark.html:/var/www/html/skins/elastic/watermark.html
      - ../config/elastic-meta.json:/var/www/html/skins/elastic/meta.json
      - ../pwa/cybrense-manifest.json:/var/www/html/public_html/cybrense-manifest.json
      - ../pwa/cybrense-sw.js:/var/www/html/public_html/cybrense-sw.js
      - ../templates:/var/www/html/skins/elastic/templates
      - ../plugins/cybrense_skin:/var/www/html/plugins/cybrense_skin

volumes:
  roundcube-e2e-db:
