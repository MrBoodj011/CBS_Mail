services:
  greenmail:
    image: greenmail/standalone:2.1.9
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=test:test@example.test
        -Dgreenmail.users.login=email
    ports:
      - "127.0.0.1:3025:3025"
      - "127.0.0.1:3143:3143"

  roundcube-e2e:
    build:
      context: ..
      dockerfile: Dockerfile
    image: cbs-mail:e2e
    depends_on:
      - greenmail
    ports:
      - "127.0.0.1:8091:80"
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: greenmail
      ROUNDCUBEMAIL_DEFAULT_PORT: 3143
      ROUNDCUBEMAIL_SMTP_SERVER: greenmail
      ROUNDCUBEMAIL_SMTP_PORT: 3025
    volumes:
      - roundcube-e2e-db:/var/roundcube/db
      - ./fixtures/config.inc.php:/var/www/html/config/config.inc.php

volumes:
  roundcube-e2e-db:
