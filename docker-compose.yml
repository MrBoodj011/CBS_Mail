services:
  roundcube:
    # Dockerfile pins the upstream image by digest.
    build:
      context: .
      dockerfile: Dockerfile
    image: cbs-mail:local
    container_name: ${CBS_MAIL_CONTAINER_NAME:-roundcube}
    restart: always
    ports:
      - "127.0.0.1:${CBS_MAIL_HTTP_PORT:-8090}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./db:/var/roundcube/db
      - ./config/config.inc.php:/var/www/html/config/config.inc.php
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_DEFAULT_HOST=${ROUNDCUBEMAIL_DEFAULT_HOST:-ssl://imap.example.com}
      - ROUNDCUBEMAIL_DEFAULT_PORT=${ROUNDCUBEMAIL_DEFAULT_PORT:-993}
      - ROUNDCUBEMAIL_SMTP_SERVER=${ROUNDCUBEMAIL_SMTP_SERVER:-ssl://smtp.example.com}
      - ROUNDCUBEMAIL_SMTP_PORT=${ROUNDCUBEMAIL_SMTP_PORT:-465}
      - ROUNDCUBEMAIL_TRUSTED_HOST=${ROUNDCUBEMAIL_TRUSTED_HOST:-}
      - CYBRENSE_ENABLE_MANAGESIEVE=${CYBRENSE_ENABLE_MANAGESIEVE:-false}
      - CYBRENSE_MANAGESIEVE_HOST=${CYBRENSE_MANAGESIEVE_HOST:-}
      - CYBRENSE_MANAGESIEVE_PORT=${CYBRENSE_MANAGESIEVE_PORT:-4190}
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1/\") === false ? 1 : 0);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
