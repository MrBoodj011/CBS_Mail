services:
  roundcube:
    # Pin the upstream image so an unreviewed latest-image change cannot enter production.
    image: roundcube/roundcubemail@sha256:dc3d04b46feb148507c52db9b536c4f5a980e2d4f339a8f1a880225f1c9c0a62
    container_name: roundcube
    restart: always
    ports:
      - "127.0.0.1:8090:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./db:/var/roundcube/db
      - ./config/config.inc.php:/var/www/html/config/config.inc.php
      - ./branding:/var/www/html/skins/elastic/branding
      - ./branding/watermark.html:/var/www/html/skins/elastic/watermark.html
      - ./config/elastic-meta.json:/var/www/html/skins/elastic/meta.json
      - ./pwa/cybrense-manifest.json:/var/www/html/skins/elastic/cybrense-manifest.json
      - ./pwa/cybrense-manifest.json:/var/www/html/public_html/cybrense-manifest.json
      - ./pwa/cybrense-sw.js:/var/www/html/public_html/cybrense-sw.js
      - ./templates:/var/www/html/skins/elastic/templates
      - ./plugins/cybrense_skin:/var/www/html/plugins/cybrense_skin
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_DEFAULT_HOST=${ROUNDCUBEMAIL_DEFAULT_HOST:-ssl://imap.example.com}
      - ROUNDCUBEMAIL_DEFAULT_PORT=${ROUNDCUBEMAIL_DEFAULT_PORT:-993}
      - ROUNDCUBEMAIL_SMTP_SERVER=${ROUNDCUBEMAIL_SMTP_SERVER:-ssl://smtp.example.com}
      - ROUNDCUBEMAIL_SMTP_PORT=${ROUNDCUBEMAIL_SMTP_PORT:-465}
      - ROUNDCUBEMAIL_TRUSTED_HOST=${ROUNDCUBEMAIL_TRUSTED_HOST:-}
