<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
html,
body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  color: #7a8798;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.empty-pane {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.empty-icon {
  width: 66px;
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 20px;
  background: #eef5ff;
  color: #0969ff;
  font-size: 28px;
}

strong {
  color: #12213a;
  font-size: 16px;
}

span {
  font-size: 13px;
}
</style>
</head>
<body>
  <div class="empty-pane">
    <div class="empty-icon">&#9993;</div>
    <strong>Aucun message selectionne</strong>
    <span>Choisissez un courrier pour l afficher ici.</span>
  </div>
</body>
</html>
